<style>
  .post-back-wrap--bottom {
    margin: 2.5rem 0 0;
    padding-top: 1.5rem;
    border-top: 1px solid #eff0f1;
    text-align: center;
  }
  .post-back-btn {
    display: inline-block;
    padding: 0.5rem 1rem;
    font-weight: 600;
    color: #fff !important;
    background-color: #159957;
    border-radius: 0.3rem;
    border: 1px solid rgba(0, 0, 0, 0.08);
    text-decoration: none !important;
  }
  .post-back-btn:hover {
    background-color: #127a46;
    color: #fff !important;
    text-decoration: none !important;
  }
  .page-header .project-tagline a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: underline;
  }
  .page-header .project-tagline a:hover {
    color: #fff;
    opacity: 1;
  }
</style>
{% if page.layout == 'post' %}
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
{% endif %}
{% if site.goatcounter and jekyll.environment == "production" %}
<script data-goatcounter="https://{{ site.goatcounter }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{% endif %}
